services:
  - type: web
    name: giles-memory-machine
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: ANTHROPIC_API_KEY
        sync: false
